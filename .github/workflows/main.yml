name: Corvit CI Pipeline

on:
  push:
    branches:
      - master   # or your branch name

jobs:
  build:
    runs-on: ubuntu-latest
   # version 2
    steps:
      # 📥 Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 Login to DockerHub (FIRST)
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 Build Docker Image
      - name: Build Docker Image
        run: docker build -t calculator-app:latest .

      # 🏷️ Tag Image
      - name: Tag Image
        run: docker tag calculator-app:latest ${{ secrets.DOCKER_USERNAME }}/calculator-app:v1.0

      # 🚀 Push Image
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/calculator-app:v1.0
